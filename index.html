<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مرصد مطابخ منى 2026 | اللوحة الاحترافية المحدثة</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #0f172a;
            --bg-main: #f1f5f9;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--secondary);
            scroll-behavior: smooth;
        }

        /* Vibrant UI Components */
        .grad-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .grad-emerald { background: linear-gradient(135deg, #10b981, #059669); }
        .grad-amber { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .grad-rose { background: linear-gradient(135deg, #f43f5e, #e11d48); }
        .grad-indigo { background: linear-gradient(135deg, #6366f1, #4f46e5); }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Enhanced Animations */
        @keyframes icon-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse-soft { animation: icon-pulse 2s infinite ease-in-out; }

        @keyframes sync-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .sync-spinning { animation: sync-spin 1s linear infinite; }

        .kpi-card {
            border-radius: 28px;
            padding: 20px;
            border: 1px solid transparent;
            background: white;
            transition: all 0.3s ease;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
        }
        .heatmap-node {
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .heatmap-node:active { transform: scale(0.85); }
        
        .tab-btn-pill { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .tab-active { background: var(--secondary); color: white !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: scale(1.05); }

        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 9999; display: none; align-items: center; justify-content: center; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease-out both; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .premium-header {
            background: #0f172a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="antialiased select-none text-right">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-white font-black text-sm tracking-widest text-center">مزامنة بيانات المتعهدين الجديدة...</p>
        </div>
    </div>

    <!-- Floating Refresh -->
    <button onclick="syncData()" id="refreshBtn" class="fixed bottom-8 left-8 z-[1000] grad-blue text-white p-5 rounded-full active:scale-90 transition-all shadow-xl group">
        <i data-lucide="refresh-cw" class="w-7 h-7 group-hover:rotate-180 transition-transform duration-500 text-center"></i>
    </button>

    <header class="premium-header sticky top-0 z-[100] transition-all duration-500">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-right">
            <div class="flex items-center gap-4">
                <div class="grad-blue p-2.5 rounded-2xl text-white shadow-lg pulse-soft border border-white/10">
                    <i data-lucide="tent" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none tracking-tight text-right">مرصد منى 2026</h1>
                    <p id="liveStatusText" class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mt-1.5 flex items-center gap-1.5 text-right">
                        <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                        مزامنة حية
                    </p>
                </div>
            </div>
            <div class="hidden md:block bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-right backdrop-blur-md">
                <div class="flex items-center gap-2.5">
                    <i data-lucide="clock" class="w-4 h-4 text-slate-400 text-right"></i>
                    <span id="currentTime" class="text-xs font-black text-slate-200 tracking-wider">00:00:00 AM</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        
        <!-- KPIs Section -->
        <section class="grid grid-cols-2 md:grid-cols-6 gap-4 animate-in">
            <div class="kpi-card glass-card group text-right shadow-sm border-r-4 border-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="droplets" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص المياه</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-water">0</div>
            </div>
            <div class="kpi-card glass-card group text-right shadow-sm border-r-4 border-amber-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-amber-50 rounded-lg text-amber-600"><i data-lucide="zap" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الكهرباء</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-electricity">0</div>
            </div>
            <div class="kpi-card glass-card group text-right shadow-sm border-r-4 border-purple-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-purple-50 rounded-lg text-purple-600"><i data-lucide="settings" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الأجهزة</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-appliances">0</div>
            </div>
            <div class="kpi-card glass-card group text-right shadow-sm border-r-4 border-orange-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-orange-50 rounded-lg text-orange-600"><i data-lucide="utensils" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الأدوات</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-tools">0</div>
            </div>
            <div class="kpi-card glass-card group text-right shadow-sm border-r-4 border-emerald-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-emerald-50 rounded-lg text-emerald-600"><i data-lucide="layers" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الأرضية</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-floors">0</div>
            </div>
            <!-- KPI جديد للغلايات -->
            <div class="kpi-card glass-card group text-right shadow-sm border-r-4 border-indigo-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-indigo-50 rounded-lg text-indigo-600"><i data-lucide="coffee" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الغلايات</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-boilers">0</div>
            </div>
        </section>

        <!-- Heatmap Section -->
        <section class="glass-card rounded-[2.5rem] p-8 animate-in text-right" style="animation-delay: 0.1s">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 text-right">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 p-2.5 rounded-xl text-white shadow-lg pulse-soft"><i data-lucide="grid-3x3" class="w-5 h-5"></i></div>
                    <h2 class="text-xl font-black text-slate-800 tracking-tight">خريطة الجاهزية الرقمية - منى</h2>
                </div>
                <div class="flex bg-slate-50 p-2 rounded-2xl border border-slate-200 gap-4 text-right text-[10px] font-black uppercase text-slate-500">
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div> جاهز</div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_8px_#f59e0b]"></div> تعثر بسيط</div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div> تعثر حرج</div>
                </div>
            </div>
            <div id="heatmapContainer" class="heatmap-grid text-right"></div>
        </section>

        <!-- Search & Filter Area -->
        <section id="explorer" class="space-y-4 animate-in" style="animation-delay: 0.2s">
            <div class="w-full relative group">
                <input type="text" id="searchInput" placeholder="بحث سريع بالمتعهد، المركز، المراقب، أو الشاخص..." class="w-full pl-6 pr-14 py-5 bg-white border-2 border-slate-100 rounded-[2rem] outline-none focus:ring-8 focus:ring-blue-500/5 focus:border-blue-500 transition-all font-bold text-right shadow-sm group-hover:border-slate-300">
                <i data-lucide="search" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-all text-center"></i>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 bg-white/50 p-3 rounded-[2.5rem] border border-slate-100 shadow-inner text-right">
                <button data-category="all" onclick="switchCategory('all')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500 tab-active"><i data-lucide="layout-grid" class="w-4 h-4 text-center"></i> الكل</button>
                <button data-category="water" onclick="switchCategory('water')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="droplets" class="w-4 h-4 text-blue-500 text-center"></i> المياه</button>
                <button data-category="electricity" onclick="switchCategory('electricity')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="zap" class="w-4 h-4 text-amber-500 text-center"></i> الكهرباء</button>
                <button data-category="appliances" onclick="switchCategory('appliances')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="settings" class="w-4 h-4 text-purple-500 text-center"></i> الأجهزة</button>
                <button data-category="tools" onclick="switchCategory('tools')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="utensils" class="w-4 h-4 text-orange-500 text-center"></i> الأدوات</button>
                <button data-category="floors" onclick="switchCategory('floors')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="layers" class="w-4 h-4 text-emerald-500 text-center"></i> الأرضية</button>
                <button data-category="boilers" onclick="switchCategory('boilers')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="coffee" class="w-4 h-4 text-indigo-500 text-center"></i> الغلايات</button>
            </div>
            
            <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-24 text-right"></div>
        </section>
    </main>

    <script>
        const CONST_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_Q8udaltEwCQL-33qnpxJHHIFWZVGEqL3wKgSKqL2eDd192MkgIE_mt5KzWRP-HGu_hEkiGmdQvay/pub?gid=498208451&single=true&output=csv"; 
        
        let allEntries = [];
        let reportData = { electricity: [], water: [], appliances: [], tools: [], floors: [], boilers: [] };
        const state = { currentCategory: 'all', searchQuery: '', isExactId: false };

        function switchCategory(cat) {
            state.searchQuery = '';
            state.isExactId = false; 
            document.getElementById('searchInput').value = '';
            state.currentCategory = cat;
            document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.category === cat));
            renderCards();
        }

        async function syncData() {
            const btnIcon = document.querySelector('#refreshBtn [data-lucide="refresh-cw"]');
            if (btnIcon) btnIcon.classList.add('sync-spinning');
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(`${CONST_CSV_URL}&t=${Date.now()}`);
                const csvText = await response.text();
                processCSV(csvText);
                renderAll();
                document.getElementById('liveStatusText').innerText = "آخر مزامنة: " + new Date().toLocaleTimeString('ar-SA');
            } catch (e) { console.error(e); } 
            finally { setTimeout(() => { document.getElementById('loading').style.display = 'none'; if (btnIcon) btnIcon.classList.remove('sync-spinning'); }, 500); }
        }

        function getImgUrl(raw) {
            if(!raw || raw === "---") return null;
            const match = raw.match(/https?:\/\/[^\s,]+/);
            return match ? match[0] : null;
        }

        function processCSV(text) {
            const lines = text.split(/\r?\n/);
            const results = [];
            const cats = { electricity: [], water: [], appliances: [], tools: [], floors: [], boilers: [] };
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const col = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length < 20) continue; // التأكد من وصولنا للأعمدة T و U
                
                const clean = (v) => v ? v.replace(/"/g, '').trim() : "";
                
                const entry = {
                    id: clean(col[0]).match(/\d+/)?.[0] || clean(col[0]), // A
                    timestamp: clean(col[1]), // B
                    observer: clean(col[2]), // C
                    name: clean(col[3]), // D
                    signpost: clean(col[4]), // E
                    floorFail: clean(col[6]).includes('لا'), // G
                    floorImg: getImgUrl(clean(col[7])), // H
                    elecFail: clean(col[8]).includes('لا'), // I
                    waterFail: clean(col[9]).includes('لا'), // J
                    appFail: clean(col[10]).includes('لا'), // K
                    appImg: getImgUrl(clean(col[11])), // L
                    toolFail: clean(col[12]).includes('لا'), // M
                    toolImg: getImgUrl(clean(col[13])), // N
                    fridgesCount: clean(col[14]), // O
                    fridgesImg: getImgUrl(clean(col[15])), // P
                    note: clean(col[16]) || "لا توجد ملاحظات", // Q
                    buffet: clean(col[17]), // R
                    buffetImg: getImgUrl(clean(col[18])), // S
                    // بند غلايات الماء الجديد
                    boilersFail: clean(col[19]).includes('لا'), // T
                    boilersImg: getImgUrl(clean(col[20])), // U
                };

                let heatmapScore = 0;
                if(entry.floorFail) { cats.floors.push(entry); heatmapScore++; }
                if(entry.appFail) { cats.appliances.push(entry); heatmapScore++; }
                if(entry.toolFail) { cats.tools.push(entry); heatmapScore++; }
                if(entry.waterFail) cats.water.push(entry);
                if(entry.elecFail) cats.electricity.push(entry);
                if(entry.boilersFail) { cats.boilers.push(entry); heatmapScore++; }

                entry.heatmapScore = heatmapScore;
                results.push(entry);
            }
            allEntries = results;
            reportData = cats;
        }

        function renderAll() {
            ['water', 'electricity', 'appliances', 'tools', 'floors', 'boilers'].forEach(k => {
                const el = document.getElementById('stat-' + k);
                if(el) el.innerText = reportData[k].length;
            });
            renderHeatmap();
            renderCards();
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmapContainer');
            container.innerHTML = allEntries.map(entry => {
                let nodeClass = 'grad-emerald shadow-[0_0_8px_#10b981]';
                if(entry.heatmapScore === 1) nodeClass = 'grad-amber shadow-[0_0_8px_#f59e0b]';
                else if(entry.heatmapScore > 1) nodeClass = 'grad-rose shadow-[0_0_8px_#f43f5e] shadow-md text-white';
                return `<div onclick="focusCard('${entry.id}')" class="heatmap-node ${nodeClass}" title="${entry.name}">${entry.id}</div>`;
            }).join('');
        }

        function focusCard(id) {
            state.currentCategory = 'all';
            state.isExactId = true; 
            document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.category === 'all'));
            state.searchQuery = id;
            document.getElementById('searchInput').value = id;
            renderCards();
            const el = document.getElementById(`card-${id}`);
            if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderCards() {
            const container = document.getElementById('cardsGrid');
            const query = state.searchQuery.toLowerCase();
            let data = (state.currentCategory === 'all') ? allEntries : reportData[state.currentCategory];
            const filtered = data.filter(d => {
                if (state.isExactId) return d.id === query; 
                return d.name?.toLowerCase().includes(query) || d.id.includes(query) || d.signpost?.toLowerCase().includes(query) || d.observer?.toLowerCase().includes(query);
            });
            
            if (filtered.length === 0) { container.innerHTML = `<div class="col-span-full py-32 text-center text-slate-300 font-black italic">لا توجد سجلات مطابقة</div>`; return; }

            container.innerHTML = filtered.map(item => {
                const centerNum = parseInt(item.id);
                const itemsList = [
                    { label: 'الأرضية', fail: item.floorFail, img: item.floorImg },
                    { label: 'الأجهزة الكهربائية', fail: item.appFail, img: item.appImg },
                    { label: 'أدوات المتعهد', fail: item.toolFail, img: item.toolImg },
                    { label: 'غلايات الماء', fail: item.boilersFail, img: item.boilersImg }, // البند الجديد
                    { label: 'الثلاجات (العدد: '+item.fridgesCount+')', fail: false, img: item.fridgesImg, isFridges: true }
                ];
                if (centerNum >= 20 && centerNum <= 25) { itemsList.push({ label: 'طاولات البوفية: '+item.buffet, fail: item.buffet.includes('لا'), img: item.buffetImg }); }
                const isReady = item.heatmapScore === 0;

                return `
                    <div id="card-${item.id}" class="glass-card rounded-[2.2rem] p-7 animate-in hover:border-blue-200 transition-all text-right relative overflow-hidden group/card text-right">
                        ${!isReady ? '<div class="absolute top-0 right-0 w-2 h-full bg-rose-500 shadow-lg"></div>' : ''}
                        
                        <div class="flex justify-between items-start mb-5">
                            <span class="grad-blue text-white px-5 py-1.5 rounded-2xl text-[11px] font-black shadow-lg">مركز #${item.id}</span>
                            <div class="flex items-center gap-1.5 text-slate-400 bg-slate-50 px-3 py-1 rounded-xl border border-slate-100">
                                <i data-lucide="clock" class="w-3 h-3 text-blue-500"></i>
                                <span class="text-[10px] font-bold">${item.timestamp}</span>
                            </div>
                        </div>

                        <h3 class="text-xl font-black text-slate-800 mb-2 leading-tight text-right">${item.name || 'متعهد مطابخ منى'}</h3>
                        
                        <div class="flex flex-wrap gap-3 mb-6 text-right">
                            <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100 shadow-sm text-center">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-rose-500 text-center"></i>
                                <span class="text-[11px] font-black text-slate-600 uppercase tracking-tighter">شاخص: ${item.signpost || '---'}</span>
                            </div>
                            <div class="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-xl border border-blue-100 shadow-sm text-center">
                                <i data-lucide="user-check" class="w-3.5 h-3.5 text-blue-600 text-center"></i>
                                <span class="text-[11px] font-black text-slate-500">المراقب: ${item.observer}</span>
                            </div>
                        </div>

                        <div class="space-y-3 mb-6">
                            ${isReady ? `
                                <div class="flex items-center gap-2 bg-emerald-50 border border-emerald-100 p-4 rounded-2xl border-r-4 border-r-emerald-500 shadow-inner mb-2">
                                    <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981] animate-pulse"></div>
                                    <span class="text-[12px] font-black text-emerald-600 uppercase tracking-widest text-center w-full">مكتمل الجاهزية التشغيلية</span>
                                </div>
                            ` : ''}
                            <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1 text-right">توثيق بنود المراجعة الميدانية:</div>
                            <div class="grid grid-cols-1 gap-2 text-right">
                                ${itemsList.map(f => `
                                    <div class="flex flex-col bg-white border border-slate-100 p-3 rounded-2xl shadow-sm text-right">
                                        <div class="flex items-center justify-between mb-2 text-right">
                                            <div class="flex items-center gap-2 text-right">
                                                <div class="w-2 h-2 rounded-full ${f.fail ? 'bg-rose-500 shadow-[0_0_6px_#ef4444]' : 'bg-emerald-500 shadow-[0_0_6px_#10b981]'}"></div>
                                                <span class="text-[11px] font-black ${f.fail ? 'text-rose-600' : 'text-slate-700'} text-right">${f.label}</span>
                                            </div>
                                            <span class="text-[9px] font-bold ${f.fail ? 'text-rose-400' : 'text-emerald-500'} text-right">${f.fail ? 'تعثر' : 'مكتمل'}</span>
                                        </div>
                                        ${f.img ? `
                                            <a href="${f.img}" target="_blank" class="flex items-center justify-center gap-2 bg-slate-50 border border-slate-100 py-2 rounded-xl text-[10px] font-black text-blue-600 hover:bg-blue-50 transition-colors shadow-sm text-center">
                                                <i data-lucide="image" class="w-3 h-3 text-center"></i> عرض صورة الإثبات
                                            </a>
                                        ` : `<div class="text-center py-2 text-[9px] text-slate-300 italic font-bold text-center">لا يوجد مرفق بصري</div>`}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-2 text-right shadow-inner text-right">
                            <div class="flex items-center gap-1.5 mb-1 text-right">
                                <i data-lucide="message-square" class="w-3 h-3 text-slate-400 text-right"></i>
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-right">ملاحظة ميدانية</span>
                            </div>
                            <p class="text-[11px] font-bold text-slate-500 leading-relaxed italic text-right">${item.note}</p>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        document.getElementById('searchInput').oninput = (e) => { state.searchQuery = e.target.value; state.isExactId = false; renderCards(); };
        function updateClock() { const now = new Date(); const timeEl = document.getElementById('currentTime'); if(timeEl) timeEl.innerText = now.toLocaleTimeString('en-US', { hour12: true }); }
        window.onload = () => { syncData(); setInterval(() => syncData(), 60000); setInterval(updateClock, 1000); lucide.createIcons(); };
    </script>
</body>
</html>
