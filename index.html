<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مرصد مطابخ منى 2026 | اللوحة الاحترافية</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #1e293b;
            --bg-main: #f1f5f9;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--secondary);
            scroll-behavior: smooth;
        }

        /* Vibrant UI Components */
        .grad-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .grad-emerald { background: linear-gradient(135deg, #10b981, #059669); }
        .grad-amber { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .grad-rose { background: linear-gradient(135deg, #f43f5e, #e11d48); }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Enhanced Animations */
        @keyframes icon-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse-soft { animation: icon-pulse 2s infinite ease-in-out; }

        @keyframes sync-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .sync-spinning { animation: sync-spin 1s linear infinite; }

        .kpi-card {
            border-radius: 28px;
            padding: 20px;
            border: 1px solid transparent;
            background: white;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
        }
        .heatmap-node {
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .heatmap-node:active { transform: scale(0.85); }
        
        .tab-btn-pill { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .tab-active { background: var(--secondary); color: white !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: scale(1.05); }

        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 9999; display: none; align-items: center; justify-content: center; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease-out both; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased select-none text-right">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-white font-black text-sm tracking-widest text-center">مزامنة الميدان...</p>
        </div>
    </div>

    <!-- Floating Refresh -->
    <button onclick="syncData()" id="refreshBtn" class="fixed bottom-8 left-8 z-[1000] grad-blue text-white p-5 rounded-full active:scale-90 transition-all shadow-xl group">
        <i data-lucide="refresh-cw" class="w-7 h-7 group-hover:rotate-180 transition-transform duration-500"></i>
    </button>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-[100] border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center text-right">
            <div class="flex items-center gap-4">
                <div class="grad-blue p-3 rounded-2xl text-white shadow-lg pulse-soft">
                    <i data-lucide="tent" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 leading-none">مرصد منى 2026</h1>
                    <p id="liveStatusText" class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest mt-1">مزامنة حية</p>
                </div>
            </div>
            <div class="hidden md:block bg-slate-100 px-4 py-2 rounded-xl border border-slate-200">
                <div class="flex items-center gap-2"><i data-lucide="clock" class="w-3.5 h-3.5 text-slate-400 animate-pulse"></i><span id="currentTime" class="text-xs font-black text-slate-500">00:00:00 AM</span></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        
        <!-- KPIs Section -->
        <section class="grid grid-cols-2 md:grid-cols-5 gap-4 animate-in">
            <div class="kpi-card glass-card">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="droplets" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص المياه</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-water">0</div>
            </div>
            <div class="kpi-card glass-card">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-amber-50 rounded-lg text-amber-600"><i data-lucide="zap" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الكهرباء</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-electricity">0</div>
            </div>
            <div class="kpi-card glass-card">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-purple-50 rounded-lg text-purple-600"><i data-lucide="settings" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الأجهزة</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-appliances">0</div>
            </div>
            <div class="kpi-card glass-card">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-orange-50 rounded-lg text-orange-600"><i data-lucide="utensils" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الأدوات</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-tools">0</div>
            </div>
            <div class="kpi-card glass-card">
                <div class="flex justify-between items-center mb-4">
                    <div class="icon-box p-2 bg-emerald-50 rounded-lg text-emerald-600"><i data-lucide="layers" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">نواقص الأرضية</span>
                </div>
                <div class="text-4xl font-black text-slate-800" id="stat-floors">0</div>
            </div>
        </section>

        <!-- Heatmap Section -->
        <section class="glass-card rounded-[2.5rem] p-8 animate-in text-right" style="animation-delay: 0.1s">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 p-2.5 rounded-xl text-white shadow-lg pulse-soft"><i data-lucide="grid-3x3" class="w-5 h-5"></i></div>
                    <h2 class="text-xl font-black text-slate-800">خريطة الجاهزية الرقمية</h2>
                </div>
                <div class="flex bg-slate-50 p-2 rounded-2xl border border-slate-200 gap-4">
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div><span class="text-[10px] font-black uppercase text-slate-500">جاهز</span></div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_8px_#f59e0b]"></div><span class="text-[10px] font-black uppercase text-slate-500">تعثر بسيط</span></div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div><span class="text-[10px] font-black uppercase text-slate-500">تعثر حرج</span></div>
                </div>
            </div>
            <div id="heatmapContainer" class="heatmap-grid"></div>
        </section>

        <!-- Search & Filter Area -->
        <section id="explorer" class="space-y-4 animate-in" style="animation-delay: 0.2s">
            
            <!-- Row 1: Quick Search (Full Width) -->
            <div class="w-full relative group">
                <input type="text" id="searchInput" placeholder="بحث سريع بالمطعم، المركز، المراقب، أو الشاخص..." class="w-full pl-6 pr-14 py-5 bg-white border-2 border-slate-100 rounded-[2rem] outline-none focus:ring-8 focus:ring-blue-500/5 focus:border-blue-500 transition-all font-bold text-right shadow-sm group-hover:border-slate-300">
                <i data-lucide="search" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-all"></i>
            </div>

            <!-- Row 2: Categories (Pills) -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 bg-white/50 p-3 rounded-[2.5rem] border border-slate-100 shadow-inner">
                <button data-category="all" onclick="switchCategory('all')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500 tab-active"><i data-lucide="layout-grid" class="w-4 h-4"></i> الكل</button>
                <button data-category="water" onclick="switchCategory('water')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="droplets" class="w-4 h-4 text-blue-500"></i> المياه</button>
                <button data-category="electricity" onclick="switchCategory('electricity')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="zap" class="w-4 h-4 text-amber-500"></i> الكهرباء</button>
                <button data-category="appliances" onclick="switchCategory('appliances')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="settings" class="w-4 h-4 text-purple-500"></i> الأجهزة</button>
                <button data-category="tools" onclick="switchCategory('tools')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="utensils" class="w-4 h-4 text-orange-500"></i> الأدوات</button>
                <button data-category="floors" onclick="switchCategory('floors')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="layers" class="w-4 h-4 text-emerald-500"></i> الأرضية</button>
            </div>
            
            <!-- Cards Grid -->
            <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-24 text-right"></div>
        </section>
    </main>

    <script>
        const CONST_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT4FTaWXDH1QoD90YJAxWOmVh6D7xuyfm6xfGftbzGvQ4prkZIuuB0nrmZJ3n0S8MsJn5vHZHAswoaP/pub?gid=1099096426&single=true&output=csv"; 
        
        let allEntries = [];
        let reportData = { electricity: [], water: [], appliances: [], tools: [], floors: [] };
        const state = { currentCategory: 'all', searchQuery: '', isExactId: false };

        function switchCategory(cat) {
            state.searchQuery = '';
            state.isExactId = false; // إعادة ضبط البحث الدقيق عند اختيار فئة
            document.getElementById('searchInput').value = '';
            
            state.currentCategory = cat;
            document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.category === cat));
            renderCards();
        }

        async function syncData() {
            const btnIcon = document.querySelector('#refreshBtn [data-lucide="refresh-cw"]');
            if (btnIcon) btnIcon.classList.add('sync-spinning');
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(`${CONST_CSV_URL}&t=${Date.now()}`);
                const csvText = await response.text();
                processCSV(csvText);
                renderAll();
                document.getElementById('liveStatusText').innerText = "آخر مزامنة: " + new Date().toLocaleTimeString('ar-SA');
            } catch (e) { console.error(e); } 
            finally { setTimeout(() => { document.getElementById('loading').style.display = 'none'; if (btnIcon) btnIcon.classList.remove('sync-spinning'); }, 500); }
        }

        function getImgUrl(raw) {
            if(!raw) return null;
            const match = raw.match(/https?:\/\/[^\s,]+/);
            return match ? match[0] : null;
        }

        function processCSV(text) {
            const lines = text.split(/\r?\n/);
            const results = [];
            const cats = { electricity: [], water: [], appliances: [], tools: [], floors: [] };
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const col = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length < 10) continue;

                const clean = (v) => v ? v.replace(/"/g, '').trim() : "";
                const entry = {
                    id: clean(col[0]).match(/\d+/)?.[0] || clean(col[0]),
                    name: clean(col[3]),
                    signpost: clean(col[4]),
                    observer: clean(col[2]),
                    time: clean(col[1]),
                    note: clean(col[14]) || "لا توجد ملاحظات",
                    waterFail: clean(col[9]).includes('لا'), waterImg: getImgUrl(clean(col[10])),
                    elecFail: clean(col[8]).includes('لا'), elecImg: getImgUrl(clean(col[8])),
                    appFail: clean(col[10]).includes('لا'), appImg: getImgUrl(clean(col[11])),
                    toolFail: clean(col[12]).includes('لا'), toolImg: getImgUrl(clean(col[13])),
                    floorFail: clean(col[6]).includes('لا'), floorImg: getImgUrl(clean(col[7])),
                };

                let heatmapScore = 0;
                if(entry.appFail) { cats.appliances.push(entry); heatmapScore++; }
                if(entry.toolFail) { cats.tools.push(entry); heatmapScore++; }
                if(entry.floorFail) { cats.floors.push(entry); heatmapScore++; }
                if(entry.waterFail) cats.water.push(entry);
                if(entry.elecFail) cats.electricity.push(entry);

                entry.heatmapScore = heatmapScore;
                results.push(entry);
            }
            allEntries = results;
            reportData = cats;
        }

        function renderAll() {
            ['water', 'electricity', 'appliances', 'tools', 'floors'].forEach(k => {
                const el = document.getElementById('stat-' + k);
                if(el) el.innerText = reportData[k].length;
            });
            renderHeatmap();
            renderCards();
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmapContainer');
            container.innerHTML = allEntries.map(entry => {
                let nodeClass = 'grad-emerald shadow-[0_0_8px_#10b981]';
                if(entry.heatmapScore === 1) nodeClass = 'grad-amber shadow-[0_0_8px_#f59e0b]';
                else if(entry.heatmapScore > 1) nodeClass = 'grad-rose shadow-[0_0_8px_#f43f5e] shadow-md';
                return `<div onclick="focusCard('${entry.id}')" class="heatmap-node ${nodeClass}" title="${entry.name}">${entry.id}</div>`;
            }).join('');
        }

        function focusCard(id) {
            state.currentCategory = 'all';
            state.isExactId = true; // تفعيل البحث المطابق تماماً
            document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.category === 'all'));
            
            state.searchQuery = id;
            document.getElementById('searchInput').value = id;
            renderCards();
            const el = document.getElementById(`card-${id}`);
            if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderCards() {
            const container = document.getElementById('cardsGrid');
            const query = state.searchQuery.toLowerCase();
            let data = (state.currentCategory === 'all') ? allEntries : reportData[state.currentCategory];
            
            const filtered = data.filter(d => {
                if (state.isExactId) {
                    return d.id === query; // مطابقة تامة لرقم المركز فقط
                }
                return d.name.toLowerCase().includes(query) || 
                       d.id.includes(query) || 
                       (d.observer && d.observer.toLowerCase().includes(query)) ||
                       (d.signpost && d.signpost.toLowerCase().includes(query));
            });
            
            if (filtered.length === 0) { container.innerHTML = `<div class="col-span-full py-32 text-center text-slate-300 font-black italic">لا توجد سجلات مطابقة</div>`; return; }

            container.innerHTML = filtered.map(item => {
                const itemsList = [
                    { label: 'المياه', fail: item.waterFail, img: item.waterImg },
                    { label: 'الكهرباء', fail: item.elecFail, img: item.elecImg },
                    { label: 'الأجهزة', fail: item.appFail, img: item.appImg },
                    { label: 'الأدوات', fail: item.toolFail, img: item.toolImg },
                    { label: 'الأرضية', fail: item.floorFail, img: item.floorImg }
                ];
                const isEnergyTab = (state.currentCategory === 'water' || state.currentCategory === 'electricity');

                return `
                    <div id="card-${item.id}" class="glass-card rounded-[2.2rem] p-7 animate-in hover:border-blue-200 transition-all text-right relative overflow-hidden group/card">
                        ${item.heatmapScore > 1 ? '<div class="absolute top-0 right-0 w-2 h-full bg-rose-500 shadow-lg"></div>' : ''}
                        
                        <div class="flex justify-between items-start mb-5">
                            <span class="grad-blue text-white px-5 py-1.5 rounded-2xl text-[11px] font-black shadow-lg">مركز #${item.id}</span>
                            <div class="flex items-center gap-1.5 text-slate-400 bg-slate-50 px-3 py-1 rounded-xl border border-slate-100">
                                <i data-lucide="clock" class="w-3 h-3 text-blue-500"></i>
                                <span class="text-[10px] font-bold">${item.time}</span>
                            </div>
                        </div>

                        <h3 class="text-xl font-black text-slate-800 mb-2 leading-tight">${item.name}</h3>
                        
                        <div class="flex flex-wrap gap-3 mb-6">
                            <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100 shadow-sm">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-rose-500"></i>
                                <span class="text-[11px] font-black text-slate-600 uppercase">شاخص: ${item.signpost || '---'}</span>
                            </div>
                            <div class="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-xl border border-blue-100 shadow-sm text-right">
                                <i data-lucide="user-check" class="w-3.5 h-3.5 text-blue-600"></i>
                                <span class="text-[11px] font-black text-slate-500">المراقب: ${item.observer}</span>
                            </div>
                        </div>

                        <div class="space-y-2 mb-6">
                            ${(isEnergyTab || item.heatmapScore === 0) ? `
                                <div class="flex items-center gap-2 bg-emerald-50 border border-emerald-100 p-4 rounded-2xl border-r-4 border-r-emerald-500 shadow-inner mb-4">
                                    <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981] animate-pulse"></div>
                                    <span class="text-[12px] font-black text-emerald-600 uppercase tracking-widest text-center w-full">مكتمل الجاهزية</span>
                                </div>
                                <div class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 text-right">إثباتات الجاهزية المرفوعة:</div>
                                <div class="grid grid-cols-2 gap-2 text-right">
                                    ${itemsList.filter(i => i.img).map(i => `
                                        <a href="${i.img}" target="_blank" class="flex items-center justify-between bg-white border border-slate-100 p-2.5 rounded-xl hover:bg-emerald-50 transition-colors shadow-sm">
                                            <span class="text-[10px] font-bold text-slate-600">${i.label}</span>
                                            <i data-lucide="image" class="w-3 h-3 text-emerald-500"></i>
                                        </a>
                                    `).join('')}
                                </div>
                            ` : `
                                ${itemsList.filter(i => i.fail).map(f => `
                                    <div class="flex items-center justify-between bg-rose-50 border border-rose-100 p-3 rounded-2xl hover:bg-rose-100 transition-colors shadow-sm">
                                        <div class="flex items-center gap-2">
                                            <div class="w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                                            <span class="text-[11px] font-black text-rose-600">نقص في ${f.label}</span>
                                        </div>
                                        ${f.img ? `<a href="${f.img}" target="_blank" class="text-[9px] font-black text-white bg-rose-500 px-3 py-1.5 rounded-lg active:scale-90 flex items-center gap-1 shadow-sm"><i data-lucide="external-link" class="w-2.5 h-2.5"></i> الإثبات</a>` : '<span class="text-[9px] text-rose-300 font-bold italic px-2 text-right">بدون صورة</span>'}
                                    </div>
                                `).join('')}
                            `}
                        </div>

                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-2 text-right shadow-inner">
                            <div class="flex items-center gap-1.5 mb-1 text-right">
                                <i data-lucide="message-square" class="w-3 h-3 text-slate-400"></i>
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-right">ملاحظة ميدانية</span>
                            </div>
                            <p class="text-[11px] font-bold text-slate-500 leading-relaxed italic text-right">${item.note}</p>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        document.getElementById('searchInput').oninput = (e) => { 
            state.searchQuery = e.target.value; 
            state.isExactId = false; // إلغاء المطابقة التامة عند الكتابة اليدوية
            renderCards(); 
        };
        
        function updateClock() { const now = new Date(); const timeEl = document.getElementById('currentTime'); if(timeEl) timeEl.innerText = now.toLocaleTimeString('en-US', { hour12: true }); }

        window.onload = () => { syncData(); setInterval(() => syncData(), 60000); setInterval(updateClock, 1000); lucide.createIcons(); };
    </script>
</body>
</html>
